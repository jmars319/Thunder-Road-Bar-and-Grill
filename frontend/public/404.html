<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Page Not Found | Thunder Road Bar & Grill</title>
    <link rel="stylesheet" href="/error-pages.css" />
  </head>
  <body>
    <main class="error-page">
      <section class="error-card">
        <div class="brand">Thunder Road Bar & Grill</div>
        <p class="code">404 · Page not found</p>
        <h1>We could not find that page.</h1>
        <p>The link may be outdated, typed incorrectly, or no longer part of the public site.</p>
        <div class="actions">
          <a class="button primary" href="/">Home</a>
          <button class="button secondary" type="button" onclick="window.history.length > 1 ? window.history.back() : window.location.assign('/')">Go back</button>
        </div>
      </section>
    </main>
  </body>
</html>
