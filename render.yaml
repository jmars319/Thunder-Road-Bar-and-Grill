# Render Blueprint - Infrastructure as Code
# This file defines your entire backend infrastructure on Render
# Deploy by connecting your GitHub repo at https://render.com

services:
  # Backend Web Service
  - type: web
    name: thunder-road-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://trbgmidway.com
      - key: TRUST_PROXY
        value: true
      - key: FORCE_HTTPS
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 24h
      - key: ALLOW_DEV_ADMIN_HEADER
        value: 0
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: thunder-road-db
          property: connectionString
    disk:
      name: uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1

databases:
  - name: thunder-road-db
    databaseName: thunder_road
    plan: free
    region: oregon
